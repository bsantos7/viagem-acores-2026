    <title>Açores 2026</title>
    <style>
        :root {
            --primary: #2C5763;
            --secondary: #EFCB68;
            --ink: #10211D;
            --muted: #5C6F68;
            --shadow: 0 22px 70px #071816;
            --smallShadow: 0 6px 18px #071816;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            color: var(--ink);
            background: url("Background.png");
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            font-family: "Segoe UI", Arial, sans-serif;
            line-height: 1.5;
        }

        button {
            border: 1px solid white;
            background: white;
            color: var(--ink);
            border-radius: 7px;
            padding: .58rem .78rem;
            cursor: pointer;
            font: inherit;
        }

            button[aria-selected="true"] {
                background: var(--primary);
                border-color: white;
                color: white
            }

            button.nav {
                color: var(--primary);
                font-size: 20px
            }

                button.nav.prev {
                    padding: 3px 12px 3px 10px
                }

                button.nav.next {
                    padding: 3px 10px 3px 12px
                }

        main {
            width: 95%;
            margin: 0 auto;
            padding: 2% 0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: white;
            padding: 0;
            text-align: center;
            z-index: 999;
            box-shadow: var(--smallShadow);
        }

        h2 {
            margin: 0;
            font-size: clamp(1.45rem, 3vw, 2.05rem);
            line-height: 1.1;
        }

        h3 {
            margin: 0 0 .45rem;
            font-size: 1.04rem;
        }

        p {
            margin: .35rem 0 0;
        }

        .muted {
            color: var(--muted);
        }

        .nav-strip {
            padding: 23px;
        }

            .nav-strip a {
                text-decoration: none;
                color: white;
                background: var(--primary);
                border-radius: 999px;
                padding: 7px 12px;
                font-weight: bold;
                margin: 3px 0
            }

        .key-item {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: .75rem;
            align-items: start;
            padding: .78rem;
            border: 1px solid black;
            border-radius: 7px;
            background: white;
        }

        .key-icon {
            width: 2.15rem;
            height: 2.15rem;
            display: grid;
            place-items: center;
            border-radius: 7px;
            background: #E2EDF1;
            font-weight: 800;
            color: #19546e;
        }

        .stat, .card {
            background: white;
            border: 1px solid white;
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .stat {
            padding: 1rem;
            min-height: 8.2rem;
            display: grid;
            align-content: space-between;
        }

            .stat small, .meta small {
                display: block;
                color: var(--muted);
            }

            .stat strong {
                display: block;
                font-size: clamp(1.45rem, 4vw, 2.2rem);
                line-height: 1.05;
                margin: .45rem 0;
            }

        section {
            padding: 1.5rem 0;
            scroll-margin-top: 1rem;
        }

        .section-head {
            color: white;
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: .85rem;
            text-shadow: 0 1px 20px black;
        }

            .section-head .muted {
                color: white;
            }

        .grid {
            display: grid;
            gap: 1rem;
        }

            .grid.two {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .grid.three {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

        .pad {
            padding: .7rem;
        }

        .status {
            display: inline-flex;
            width: fit-content;
            border-radius: 999px;
            padding: .22rem .58rem;
            margin-bottom: 10px;
            font-size: .82rem;
            font-weight: 700;
        }

            .status.ok {
                background: #E0E9E5;
                color: #245443;
            }

            .status.warn {
                background: #F5E9DE;
                color: #814b17;
            }

        .timeline {
            display: grid;
            gap: .82rem;
            position: relative;
        }

        .event {
            display: grid;
            grid-template-columns: 10.4rem 1fr;
            gap: .8rem;
            align-items: stretch;
        }

        .event-date {
            color: white;
            border: 1px solid white;
            border-radius: 7px;
            padding: .7rem;
            background: var(--primary);
            font-weight: 800;
        }

        .media {
            min-height: 14rem;
            background-size: cover;
            background-position: center;
            background-color: white;
        }

        .accommodation {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            min-height: 23rem;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .5rem;
            margin-top: .8rem;
        }

            .photo-grid div {
                min-height: 9rem;
                border-radius: 7px;
                background-size: cover;
                background-position: center;
            }

        .meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: .7rem;
            margin: 1rem 0;
        }

            .meta > div {
                border: 1px solid black;
                border-radius: 7px;
                padding: .72rem;
                background: white;
            }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: .45rem;
            margin-bottom: .85rem;
        }

        .slide-shell {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(280px, .85fr);
            gap: 1rem;
            align-items: stretch;
        }

        .slide-photo {
            min-height: 33rem;
            background-size: cover;
            background-position: center;
            position: relative;
        }

            .slide-photo::after {
                content: "";
                position: absolute;
                inset: 0;
            }

        .map {
            position: relative;
        }

            .map a {
                position: absolute;
                height: 100%;
                align-content: center;
                right: 20px;
                font-weight: bold;
                top: 0;
                color: var(--primary);
                text-decoration: none;
            }

        .caption {
            position: absolute;
            z-index: 1;
            left: 1rem;
            right: 1rem;
            bottom: 1rem;
            color: white;
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
        }

            .caption h3 {
                font-size: clamp(1.7rem, 5vw, 3rem);
                line-height: 1;
                margin: .35rem 0 0;
            }

        .slide-controls {
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .list {
            display: grid;
            gap: .72rem;
        }

        .row {
            display: grid;
            grid-template-columns: 50% 50%;
            gap: 1rem;
            align-items: center;
            padding: .82rem;
            border-radius: 7px;
            background: white;
        }

            .row.one {
                grid-template-columns: 100% auto
            }

        .money {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: .78rem;
            border-bottom: 1px solid black;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: .86rem;
        }

            td:last-child, th:last-child {
                text-align: right;
            }

        @media (max-width: 900px) {
            .grid.two, .grid.three, .accommodation, .slide-shell {
                grid-template-columns: 1fr;
            }

            .slide-photo {
                min-height: 24rem;
            }

            .header .nav-strip .menuText {
                display: none
            }
        }

        @media (max-width: 560px) {
            main {
                width: min(100% - 1rem, 1180px);
            }

            .event {
                grid-template-columns: 1fr;
            }

            .meta, .row {
                grid-template-columns: 1fr;
            }

            .money {
                text-align: left;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }

            .caption {
                align-items: start;
                flex-direction: column;
            }

            .tabs button {
                flex: 1 1 auto;
            }
        }

        @media print {
            body {
                background: white;
            }

            .section-head {
                color: var(--ink);
                text-shadow: none;
            }

                .section-head .muted {
                    color: var(--muted);
                }

            .card, .stat {
                box-shadow: none;
                backdrop-filter: none;
                break-inside: avoid;
            }

            .slide-controls, .tabs, .nav-strip {
                display: none;
            }

            .slide-photo, .media {
                min-height: 10rem;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

                    description: "Jardim Terra Nostra, águas termais, fumarolas e cozido das Furnas. É a zona ideal para reservar restaurante com antecedência.",
                    notes: "Levar fato de banho escuro, toalha e chinelos. Validar horários do parque."
                },
                {
                    name: "Observação de baleias",
                    local: "Furnas",
                    location: "Furnas",
                    cost: "Pago",
                    plannedDate: "Por marcar",
                    duration: "3 horas",
                    priority: "Opcional",
                    image: "https://media-cdn.tripadvisor.com/media/attractions-splice-spp-674x446/0b/93/a8/dc.jpg",
                    description: "Atividade em barco com guias locais. Boa alternativa para uma manhã com mar calmo.",
                    notes: "Comparar operadores, políticas de cancelamento e probabilidade de enjoo."
                }
            ],
            foods: [
                {
                    name: "Ananás dos Açores",
                    local: "Fajã de Baixo",
                    location: "Furnas",
                    cost: "Baixo",
                    plannedDate: "Por marcar",
                    place: "Plantação de ananases",
                    priority: "Média",
                    image: "https://commons.wikimedia.org/wiki/Special:FilePath/Azorean%20pineapple%20Ponta%20Delgada%2C%20S%C3%A3o%20Miguel%2C%20Azores%20%28A%C3%A7ores%29%20Archipelago%2C%20Portugal%20%2849051108891%29.jpg",
                    description: "Visita curta a estufas de ananás, com prova de fruta, compotas ou licor.",
                    notes: "Combina bem com uma manhã leve em Ponta Delgada."
                },
                {
                    name: "Cozido das Furnas",
                    local: "Furnas",
                    location: "Furnas",
                    cost: "Pago",
                    plannedDate: "15 set, almoço",
                    place: "Restaurante Tony's ou Caldeiras & Vulcões",
                    priority: "Imperdível",
                    image: "https://commons.wikimedia.org/wiki/Special:FilePath/Cozido%20das%20Furnas%20%2850687782641%29.jpg",
                    description: "Prato cozinhado lentamente com o calor vulcânico das caldeiras. É uma das experiências gastronómicas mais típicas de São Miguel.",
                    notes: "Reservar com antecedência e confirmar hora de levantamento do cozido."
                },
                {
                    name: "Queijadas da Vila",
                    local: "Vila Franca do Campo",
                    location: "Furnas",
                    cost: "Baixo",
                    plannedDate: "16 set",
                    place: "Fábrica das Queijadas da Vila",
                    priority: "Alta",
                    image: "https://commons.wikimedia.org/wiki/Special:FilePath/Queijadas%20aus%20Vila%20Franca%20do%20Campo%2C%20Azoren%202016.JPG",
                    description: "Doce tradicional pequeno, cremoso e fácil de levar para uma pausa durante o passeio.",
                    notes: "Comprar uma caixa para partilhar no carro ou levar para o alojamento."
                },
                {
                    name: "Lapas grelhadas",
                    local: "Rabo de Peixe",
                    location: "Furnas",
                    cost: "Pago",
                    plannedDate: "Por marcar",
                    place: "Restaurante junto ao mar",
                    priority: "Alta",
                    image: "https://commons.wikimedia.org/wiki/Special:FilePath/Lapas%20grelhadas%2C%20Rabo%20de%20Peixe%20A%C3%A7ores.jpg",
                    description: "Marisco simples e muito típico, servido quente com alho, limão e molho. Boa opção para petisco de fim de tarde.",
                    notes: "Pedir para partilhar e confirmar se há disponibilidade no dia."
                }
            ],
            actions: [
                "Confirmar nomes completos e documentos nos voos.",
                "Fechar seguro e segundo condutor do carro.",
                "Reservar cozido das Furnas se o grupo quiser almoço tradicional.",
                "Validar meteorologia antes de fixar Sete Cidades e Lagoa do Fogo."
            ]
        };

        let activeInterest = 0;
        let activeFood = 0;

        function euro(value) {
            return new Intl.NumberFormat("pt-PT", { style: "currency", currency: "EUR" }).format(Number(value || 0));
        }

        function pct(paid, total) {
            return total ? Math.max(0, Math.min(100, Math.round((paid / total) * 100))) : 0;
        }

        function img(url) {
            return `background-image: linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.30)), url("${url}")`;
        }

        function totals() {
            const values = data.payments.reduce((acc, p) => {
                acc.total += Number(p.amount || 0);
                acc.paid += Number(p.paid || 0);
                return acc;
            }, { total: 0, paid: 0 });
            values.remaining = Math.max(0, values.total - values.paid);
            return values;
        }

        function render() {
            renderTimeline();
            renderFlights();
            renderStay();
            renderCar();
            renderInterests();
            renderFoods();
        }

        function renderTimeline() {
            const plannedItems = [
                ...data.interests.filter(i => i.plannedDate && i.plannedDate.toLowerCase() !== "por marcar").map(i => ({ date: i.plannedDate, title: i.name, detail: `${i.duration} · ${i.cost}` })),
                ...data.foods.filter(i => i.plannedDate && i.plannedDate.toLowerCase() !== "por marcar").map(i => ({ date: i.plannedDate, title: `Provar: ${i.name}`, detail: `${i.local} · ${i.cost}` }))
            ].sort((a, b) => a.date.localeCompare(b.date));

            const items = [
                { date: data.flights.outbound_date + " " + data.flights.outbound_depart, title: `Voo de ida: ${data.flights.from} - ${data.flights.to}`, detail: `${data.flights.outbound_depart} - ${data.flights.outbound_arrive} · ${data.flights.airline}` },
                { date: data.car.pickupTime, title: `Recolha do carro: ${data.car.pickupPlace}`, detail: data.car.model },
                { date: data.accommodation.checkIn, title: `Check-in: ${data.accommodation.name}`, detail: data.accommodation.address },
                ...plannedItems.map(i => ({ date: i.date, title: i.title, detail: i.detail })),
                { date: data.accommodation.checkOut, title: "Check-out", detail: data.accommodation.name },
                { date: data.car.dropoffTime, title: `Entrega do carro · ${data.car.pickupPlace}`, detail: data.car.company },
                { date: data.flights.return_date + " " + data.flights.return_depart, title: `Voo de volta: ${data.flights.from} - ${data.flights.to}`, detail: `${data.flights.return_depart} - ${data.flights.return_arrive} · ${data.flights.airline}` }
            ];
            document.getElementById("timeline").innerHTML = items.map(item => `
        <article class="event">
          <div class="event-date">${item.date}</div>
          <div class="card pad"><h3>${item.title}</h3><p class="muted">${item.detail}</p></div>
        </article>
      `).join("");
        }

        function renderFlights() {
            document.getElementById("flights").innerHTML = `<article class="card pad">
          <span class="status ${data.flights.paid >= data.flights.total ? "ok" : "warn"}">${euro(data.flights.paid)} pagos de ${euro(data.flights.total)}</span>
          <h3>Ida · ${data.flights.outbound_date}</h3>
          <div class="row">
			<div><strong>${data.flights.from}</strong><p class="muted">Partida ${data.flights.outbound_depart}</p></div>
			<div><strong>${data.flights.to}</strong><p class="muted">Chegada ${data.flights.outbound_arrive}</p></div>
          </div>
          <h3>Volta · ${data.flights.return_date}</h3>
          <div class="row">
			<div><strong>${data.flights.from}</strong><p class="muted">Partida ${data.flights.return_depart}</p></div>
			<div><strong>${data.flights.to}</strong><p class="muted">Chegada ${data.flights.return_arrive}</p></div>
          </div>
          <h3>Bagagens</h3>
          <div class="row one">
			<div>${data.flights.bags}</p></div>
          </div>
        </article>`;
        }

        function renderStay() {
            const stay = data.accommodation;
            document.getElementById("stay").innerHTML = `
        <div class="media" style='${img(stay.photos[0] || "")}'></div>
        <div class="pad">
          <span class="status ${stay.paid >= stay.total ? "ok" : "warn"}">${euro(stay.paid)} pagos de ${euro(stay.total)}</span>
          <h3>${stay.name}</h3>
          <p>${stay.address}</p>
          <div class="meta">
            <div><small>Check-in</small><strong>${stay.checkIn}</strong></div>
            <div><small>Check-out</small><strong>${stay.checkOut}</strong></div>
            <div><small>Contacto</small><strong>${stay.host}</strong></div>
            <div><small>Por pagar</small><strong>${euro(Math.max(0, stay.total - stay.paid))}</strong></div>
          </div>
          <p class="muted">${stay.notes}</p>
          <div class="photo-grid">${stay.photos.slice(1, 5).map(p => `<div style='${img(p)}'></div>`).join("")}</div>
        </div>
      `;
        }

        function renderCar() {
            const car = data.car;
            const info = [
                ["Empresa", car.company], ["Modelo", car.model], ["Recolha", car.pickupPlace + " " + car.pickupTime], ["Entrega", car.dropoffPlace + " " + car.dropoffTime],
                ["Estado do combustível", car.fuelState], ["Caução", euro(car.deposit)], /*["Por pagar", euro(Math.max(0, car.total - car.paid))]*/
            ];
            document.getElementById("car").innerHTML = `
        <article class="card pad">
          <span class="status ${car.paid >= car.total ? "ok" : "warn"}">${euro(car.paid)} pagos de ${euro(car.total)}</span>
          <div class="meta">${info.map(i => `<div><small>${i[0]}</small><strong>${i[1]}</strong></div>`).join("")}</div>
          <br><div><div><h3>Notas</h3><p>${car.notes}</p></div></div>
        </article>
      `;
        }

        function renderSlide(collection, activeIndex, tabId, photoId, detailsId, prefix) {
            const tabs = document.getElementById(tabId);
            tabs.innerHTML = collection.map((item, index) => `
        <button type="button" role="tab" aria-selected="${index === activeIndex}" data-index="${index}">${item.name}</button>
      `).join("");
            tabs.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
                if (prefix === "interest") activeInterest = Number(btn.dataset.index);
                else activeFood = Number(btn.dataset.index);
                prefix === "interest" ? renderInterests() : renderFoods();
            }));

            const item = collection[activeIndex] || {};
            document.getElementById(photoId).style = img(item.image || "");
            document.getElementById(photoId).innerHTML = `
        <div class="caption">
          <div><h3>${item.name || "Item"}</h3></div>
          <div class="slide-controls">
            <button type="button" class="nav prev" id="${prefix}Prev" aria-label="Anterior">❮</button>
            <button type="button" class="nav next" id="${prefix}Next" aria-label="Seguinte">❯</button>
          </div>
        </div>`;

            const isFood = prefix === "food";
            document.getElementById(detailsId).innerHTML = `
        <span class="status ${String(item.cost).toLowerCase().includes("grat") || String(item.cost).toLowerCase().includes("baixo") ? "ok" : "warn"}">${item.cost || "Custo por definir"}</span>
        <h3>${item.name || "Por definir"}</h3>
        <p>${item.description || ""}</p>
        <div class="meta">
          <div><small>Data prevista</small><strong>${item.plannedDate || "Por marcar"}</strong></div>
          <div class="map"><small>Zona</small><strong>${item.local}</strong><a href="${item.location}" target="_blank">NAVEGAR ❯</a></div>
          <div><small>${isFood ? "Local sugerido" : "Duração"}</small><strong>${isFood ? item.place || "-" : item.duration || "-"}</strong></div>
          <div><small>Prioridade</small><strong>${item.priority || "-"}</strong></div>
        </div>
        <h3>Notas</h3>
        <p class="muted">${item.notes || ""}</p>
      `;

            document.getElementById(`${prefix}Prev`).addEventListener("click", () => {
                if (prefix === "interest") {
                    activeInterest = (activeInterest - 1 + data.interests.length) % data.interests.length;
                    renderInterests();
                } else {
                    activeFood = (activeFood - 1 + data.foods.length) % data.foods.length;
                    renderFoods();
                }
            });
            document.getElementById(`${prefix}Next`).addEventListener("click", () => {
                if (prefix === "interest") {
                    activeInterest = (activeInterest + 1) % data.interests.length;
                    renderInterests();
                } else {
                    activeFood = (activeFood + 1) % data.foods.length;
                    renderFoods();
                }
            });
        }

        function renderInterests() {
            if (activeInterest >= data.interests.length) activeInterest = 0;
            renderSlide(data.interests, activeInterest, "interestTabs", "interestPhoto", "interestDetails", "interest");
        }

        function renderFoods() {
            if (activeFood >= data.foods.length) activeFood = 0;
            renderSlide(data.foods, activeFood, "foodTabs", "foodPhoto", "foodDetails", "food");
        }

        render();
  </script>
</body>
</html>
